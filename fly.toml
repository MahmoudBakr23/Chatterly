app = "chatterly-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RAILS_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]

[processes]
  web = "bundle exec rails server -p 8080 -b 0.0.0.0"
  worker = "bundle exec sidekiq"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
